<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Honch CLI</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      margin: 0 0 16px;
    }

    p {
      margin: 0 0 16px;
    }

    code {
      display: block;
      overflow-x: auto;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Honch CLI</h1>
    <p>Install with Go:</p>
    <code>go install honch.dev/honch@latest</code>
    <p>Or use the installer:</p>
    <code>curl -fsSL https://honch.dev/install | sh</code>
  </main>
</body>
</html>
