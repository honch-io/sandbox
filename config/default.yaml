repos:
  capture: ../platform
  platform: ../platform
  worker: ../platform
repo_sources:
  capture: ""
  platform: https://github.com/honch-io/platform.git
  worker: ""
ports:
  capture: 8001
  worker: 8080
  clickhouse: 8123
  proxy: 18080
  control: 18081
sandbox:
  project_id: 00000000-0000-0000-0000-000000000002
  token: honch_e2e_test_key
  clickhouse_database: platform
  endpoint_url: http://127.0.0.1:8001
  proxy_bind: 127.0.0.1
  state_dir: .honch-sandbox
stack:
  images:
    - postgres:16-alpine
    - redis:7-alpine
    - clickhouse/clickhouse-server:24.8
    - gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
  start_commands:
    - repo: platform
      working_dir: infra
      args: [docker, compose, up, -d]
    - repo: capture
      args: [cargo, run, -p, honch-capture]
      env:
        SERVER_ADDR: 0.0.0.0:8001
        PUBSUB_EMULATOR_HOST: localhost:8085
        PUBSUB_PROJECT_ID: platform-local
        PUBSUB_EVENTS_TOPIC: events-raw
        REDIS_URL: redis://localhost:6379
        DATABASE_URL: postgresql://platform:platform@localhost:5432/platform
        RATE_LIMIT_PER_SECOND: "1000"
        RUST_LOG: honch_capture=debug,tower_http=debug
      background: true
      log: capture.log
    - repo: worker
      args: [cargo, run, -p, honch-unified-worker]
      env:
        PUBSUB_EMULATOR_HOST: localhost:8085
        PUBSUB_PROJECT_ID: platform-local
        EVENTS_PUBSUB_TOPIC: events-raw
        EVENTS_PUBSUB_SUBSCRIPTION: events-raw-subscription
        CLICKHOUSE_URL: http://localhost:8123
        CLICKHOUSE_DATABASE: platform
        DATABASE_URL: postgresql://platform:platform@localhost:5432/platform
        REDIS_URL: redis://localhost:6379/0
        RUST_LOG: honch_unified_worker=info
      background: true
      log: worker.log
  stop_commands:
    - repo: platform
      working_dir: infra
      args: [docker, compose, down]
