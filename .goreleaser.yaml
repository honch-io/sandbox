version: 2

project_name: honch

builds:
  - id: honch
    main: ./cmd/honch
    binary: honch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: binaries
    ids:
      - honch
    formats:
      - binary
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: SHA256SUMS

changelog:
  sort: asc
  abbrev: -1
  format: "{{ .Message }}"
  filters:
    exclude:
      - "^Merge "
      - "^docs:"
      - "^test:"
      - "^chore:"
