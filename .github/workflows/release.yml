name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify sandbox CLI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -count=1 ./...

      - name: Build
        run: go build ./...

  build:
    name: Build release binary
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      CGO_ENABLED: 0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" \
            -o dist/honch-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/honch

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: honch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/honch-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: honch-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum honch-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/honch-*
            dist/SHA256SUMS
