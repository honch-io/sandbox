name: esp-idf
kind: qemu-esp32
harness: harnesses/esp-idf
build:
  tool: idf.py
  target: esp32
  output: qemu-flash-image
run:
  tool: qemu-system-xtensa
  serial: tcp
emulator:
  tool: qemu-system-xtensa
  machine: esp32
  network: open_eth
controls:
  transport: newline-json-uart
  path: session-runner-control-fifo
events:
  source: real-sdk-http-cbor
  sink: real-clickhouse
